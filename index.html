<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IBS W9 · Alliance Governance & R&D Co-Development ｜學生版</title>
<style>
:root{
  --ntu:#002B5C; --ntu2:#01356F; --gold:#C9A227;
  --paper:#F4F7FC; --ink:#0B1220; --muted:#475569;
  --muted2:#64748B; --line:#D7DEE9; --card:#FFFFFF;
  --shadow:0 10px 30px rgba(2,6,23,.10);
  --radius:16px; --radius2:20px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  --s0:#065F46; --t1:#4C1D95; --t2:#0F766E; --c1:#B45309; --s1:#1E3A5F; --ai:#991B1B;
  --green:#15803D; --sub:#94A3B8; --surface:#FBFCFE;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--sans);font-size:16px;color:var(--ink);
  background:radial-gradient(1200px 600px at 8% 0%,rgba(0,43,92,.07),transparent 55%),
             radial-gradient(900px 500px at 96% 4%,rgba(201,162,39,.10),transparent 55%),
             var(--paper);}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(244,247,252,.94);backdrop-filter:blur(10px);z-index:20;}
.brand{display:flex;gap:12px;align-items:center;min-width:0;}
.logo{width:50px;height:50px;display:grid;place-items:center;border-radius:14px;
  background:linear-gradient(135deg,var(--ntu),var(--ntu2));color:#fff;
  font-weight:900;letter-spacing:.08em;box-shadow:0 8px 22px rgba(0,43,92,.28);font-size:13px;}
.brandText{min-width:0;}
.course{font-size:11px;color:var(--muted);letter-spacing:.03em;}
.topic{font-size:15px;font-weight:900;color:var(--ntu);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;
  font-weight:700;cursor:pointer;transition:.12s ease;font-size:13px;color:var(--ink);}
.btn:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.08);}
.btn.gold{border-color:rgba(201,162,39,.45);background:rgba(201,162,39,.12);color:#5A4600;}
.btn.primary{background:var(--ntu);color:#fff;border-color:var(--ntu);}
.btn.primary:hover{background:var(--ntu2);}
.btn.ai-btn{background:var(--ai);color:#fff;border-color:var(--ai);font-size:13px;}
.btn.ai-btn:hover{background:#7f1d1d;}
.layout{display:grid;grid-template-columns:288px 1fr;gap:18px;padding:18px;max-width:1480px;margin:0 auto;}
.sidebar{position:sticky;top:86px;align-self:start;border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.78);backdrop-filter:blur(8px);box-shadow:var(--shadow);padding:14px;
  max-height:calc(100vh - 104px);overflow-y:auto;}
.navTitle{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;padding:0 4px;}
.navItem{width:100%;text-align:left;padding:9px 11px;border-radius:11px;border:1px solid transparent;
  background:transparent;cursor:pointer;font-weight:700;font-size:13px;color:var(--ntu2);display:block;
  transition:.1s ease;margin-bottom:2px;line-height:1.35;}
.navItem:hover{background:rgba(0,43,92,.06);}
.navItem.active{background:rgba(0,43,92,.10);border-color:rgba(0,43,92,.18);}
.navItem.seg-s0.active{background:rgba(6,95,70,.10);border-color:rgba(6,95,70,.25);color:var(--s0);}
.navItem.seg-t1.active{background:rgba(76,29,149,.10);border-color:rgba(76,29,149,.25);color:var(--t1);}
.navItem.seg-t2.active{background:rgba(15,118,110,.10);border-color:rgba(15,118,110,.25);color:var(--t2);}
.navItem.seg-c1.active{background:rgba(180,83,9,.10);border-color:rgba(180,83,9,.25);color:var(--c1);}
.navItem.seg-s1.active{background:rgba(30,58,95,.10);border-color:rgba(30,58,95,.25);color:var(--s1);}
.navFooter{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.hint{font-size:11px;color:var(--muted);line-height:1.5;}
.kbd{font-family:var(--mono);font-weight:900;padding:2px 6px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--muted);font-size:10px;}
.content{border:1px solid var(--line);border-radius:var(--radius2);background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);box-shadow:var(--shadow);padding:24px;min-height:calc(100vh - 160px);}
.sectionHead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:20px;}
.h1{font-size:27px;font-weight:900;color:var(--ntu);margin:0;line-height:1.18;}
.sub{margin:6px 0 0;color:var(--muted);line-height:1.5;font-size:15px;}
.tag{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(0,43,92,.25);
  background:rgba(0,43,92,.08);color:var(--ntu);padding:8px 14px;border-radius:999px;font-weight:800;white-space:nowrap;font-size:13px;}
.timeTracker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.timePill{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);}
.timePill.s0{background:var(--s0);color:#fff;border-color:var(--s0);}
.timePill.t1{background:var(--t1);color:#fff;border-color:var(--t1);}
.timePill.t2{background:var(--t2);color:#fff;border-color:var(--t2);}
.timePill.c1{background:var(--c1);color:#fff;border-color:var(--c1);}
.timePill.s1{background:var(--s1);color:#fff;border-color:var(--s1);}
.timePill.cur{opacity:1!important;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.card{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
.cardTitle{font-weight:900;color:var(--ntu);margin:0 0 10px;font-size:15px;}
.p{margin:0;color:var(--ink);line-height:1.65;font-size:15px;}
.ul{margin:8px 0 0 20px;color:var(--ink);line-height:1.65;font-size:15px;}
.ul li{margin-bottom:5px;}
.sm{font-size:13px;color:var(--muted);}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0;}
.callout{border-left:5px solid var(--ntu);padding:12px 14px;background:rgba(0,43,92,.05);border-radius:12px;margin:10px 0;line-height:1.6;}
.callout.gold{border-color:var(--gold);background:rgba(201,162,39,.08);}
.callout.green{border-color:#15803d;background:rgba(21,128,61,.06);}
.callout.purple{border-color:#7C3AED;background:rgba(124,58,237,.06);}
.callout.red{border-color:#DC2626;background:rgba(220,38,38,.05);}
.callout.teal{border-color:#0E7490;background:rgba(14,116,144,.06);}
.callout.teacher{border-color:#D97706;background:rgba(217,119,6,.07);border-style:dashed;}
.callout strong{color:var(--ntu);}
.callout.gold strong{color:#7C5500;}
.callout.green strong{color:#14532D;}
.callout.purple strong{color:#5B21B6;}
.callout.red strong{color:#991B1B;}
.callout.teal strong{color:#164E63;}
.callout.teacher strong{color:#92400E;}
.pillRow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 11px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.dot.b{background:var(--ntu);} .dot.g{background:#15803d;} .dot.p{background:#7C3AED;} .dot.r{background:#DC2626;} .dot.t{background:#0E7490;}
.qBox{border:1.5px dashed rgba(0,43,92,.28);background:rgba(0,43,92,.03);border-radius:14px;padding:14px;}
.qTitle{font-weight:900;margin:0 0 10px;color:var(--ntu);font-size:15px;}
.options{display:grid;gap:8px;}
.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:700;text-align:left;transition:.1s ease;font-size:14px;color:var(--ink);}
.opt:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.07);}
.opt.chosen{border-color:rgba(0,43,92,.50);background:rgba(0,43,92,.06);}
.opt.correct{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.opt.wrong{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.opt[disabled]{cursor:default;}
.barWrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
.bar{height:11px;border-radius:999px;background:rgba(0,0,0,.06);overflow:hidden;flex:1;border:1px solid var(--line);}
.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--ntu));transition:width .4s ease;}
.smallVote{color:var(--muted);font-size:12px;font-family:var(--mono);}
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);}
.tbl th,.tbl td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;line-height:1.5;}
.tbl th{background:rgba(0,43,92,.06);color:var(--ntu);font-weight:800;font-size:12.5px;letter-spacing:.02em;}
.tbl tbody tr:nth-child(even){background:rgba(244,247,252,.55);}
.tbl tbody tr:hover{background:rgba(201,162,39,.06);}
.revealBox{display:none;}
.revealBox.visible{display:block;animation:fadeSlide .3s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
/* AI Exercise */
.aiBox{border:2px solid rgba(153,27,27,.3);background:rgba(153,27,27,.03);border-radius:16px;padding:16px;margin:14px 0;}
.aiBoxTitle{font-weight:900;color:var(--ai);font-size:14px;margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.aiOutput{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;min-height:80px;font-size:14px;line-height:1.7;color:var(--ink);margin:10px 0;white-space:pre-wrap;}
.aiOutput.loading{color:var(--muted);font-style:italic;}
.critiqueInput{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;font-family:var(--sans);resize:vertical;min-height:80px;color:var(--ink);}
.critiqueInput:focus{outline:none;border-color:rgba(0,43,92,.4);}
/* AI workflow + copy-prompt UI */
.workflowSteps{background:rgba(15,118,110,.06);border-left:3px solid var(--t2);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:13px;line-height:1.7;}
.workflowSteps strong{color:var(--t2);}
.aiBox-link{display:inline-block;background:#fff;border:1px solid #D1D5DB;border-radius:6px;padding:3px 10px;margin:3px 4px 3px 0;font-size:12px;text-decoration:none;color:var(--ink);font-weight:600;}
.aiBox-link:hover{background:#F3F4F6;border-color:var(--t2);color:var(--t2);}
.promptBox{background:#1F2937;color:#F9FAFB;border-radius:10px;padding:12px 14px;margin:10px 0;}
.promptBox .promptHeader{font-size:12px;color:#9CA3AF;font-weight:700;margin:0 0 8px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.promptBox pre{margin:0;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.6;color:#F9FAFB;max-height:280px;overflow-y:auto;}
.copy-btn{background:#10B981;color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.copy-btn:hover{background:#059669;}
.copy-btn.copied{background:#3B82F6;}
.responseInput{width:100%;border:1.5px solid #94A3B8;border-radius:12px;padding:10px 12px;font-size:13px;font-family:var(--sans);resize:vertical;min-height:90px;background:#F8FAFC;color:var(--ink);}
.responseInput:focus{outline:none;border-color:var(--t2);background:#fff;}
/* Debate box */
.debateGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;}
.debateCard{border:1px solid var(--line);border-radius:14px;padding:14px;}
.debateCard.a{border-left:4px solid var(--t1);}
.debateCard.b{border-left:4px solid var(--t2);}
.debateLabel{font-weight:900;font-size:13px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
.debateCard.a .debateLabel{color:var(--t1);}
.debateCard.b .debateLabel{color:var(--t2);}
/* Governance diagram */
.govBar{background:linear-gradient(90deg,#E0F2FE,#DDD6FE,#FEE2E2);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:13px;margin:10px 0;}
.govItem{text-align:center;flex:1;}
.govArrow{color:var(--muted);font-size:18px;}
/* Teacher badge */
.teacherBadge{display:inline-block;background:#D97706;color:#fff;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.04em;margin-left:8px;}
/* word counter */
.wc{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;margin-top:4px;}
/* responsive */
@media(max-width:880px){.layout{grid-template-columns:1fr;}.sidebar{position:static;max-height:none;}.grid2,.grid3{grid-template-columns:1fr;}.debateGrid{grid-template-columns:1fr;}}
/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ntu);color:#fff;padding:10px 20px;border-radius:999px;font-weight:700;font-size:14px;transition:.3s ease;z-index:100;pointer-events:none;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">NTU<br>IBS</div>
    <div class="brandText">
      <div class="course">IBS 2026 · International Business Strategy</div>
      <div class="topic">W9 · 聯盟治理 × R&D 共同開發</div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="btnLang">EN / 中</button>
    <button class="btn" id="btnReset">↺ Reset</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="navTitle">W9 Segments</div>
    <button class="navItem seg-s0" data-view="s0">🎬 S0 · 開場：劇情 + 核心問題 · 8 min</button>
    <button class="navItem seg-t1" data-view="t1">🏛️ T1 · Reuer 2024：聯盟治理機制 · 20 min <span style="font-size:9px;color:var(--gold);">🤖</span></button>
    <button class="navItem seg-t2" data-view="t2">⚡ T2 · Zahoor 2023：AMC × 共同創新 · 15 min <span style="font-size:9px;color:var(--gold);">🤖</span></button>
    <button class="navItem seg-c1" data-view="c1">🚜 C1 · 案例整合：佃製作所的抉擇 · 12 min <span style="font-size:9px;color:var(--gold);">🤖</span></button>
    <button class="navItem seg-s1" data-view="s1">📝 S1 · 策略備忘錄 · 5 min</button>
    <div class="navFooter">
      <div class="hint">⬅ ➡ 切換段落<br/><span class="kbd">L</span> 語言 <span class="kbd">R</span> 重置<br/><br/>🤖 = AI 互動批判練習</div>
    </div>
  </nav>
  <main class="content" id="content"></main>
</div>
<div id="toast"></div>

<script>
const STORE = "ibs_w9_2026_student";
const IS_TEACHER = false;
const VIEW_ORDER = ["s0","t1","t2","c1","s1"];
const DEF = {lang:"zh",presenter:false,view:"s0",polls:{},quizDone:{},reveals:{},game:{},gameRevealed:false};
let ST = load();
const content = document.getElementById("content");
const toast = document.getElementById("toast");
function load(){try{const s=localStorage.getItem(STORE);return s?{...DEF,...JSON.parse(s)}:{...DEF};}catch(e){return{...DEF};}}
function save(){try{localStorage.setItem(STORE,JSON.stringify(ST));}catch(e){}}
function showToast(m){toast.textContent=m;toast.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove("show"),2200);}
function countWords(text){if(!text||!text.trim())return 0;const s=text.trim();const cjk=(s.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g)||[]).length;const latin=s.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g," ").trim();const lw=latin?latin.split(/\s+/).filter(Boolean).length:0;return cjk+lw;}

function getPoll(k){return ST.polls[k]||{a:0,b:0,c:0,d:0,choice:null};}
function vote(k,ch){const p=getPoll(k);if(p.choice)p[p.choice]=Math.max(0,(p[p.choice]||0)-1);p.choice=ch;p[ch]=(p[ch]||0)+1;ST.polls[k]=p;save();}
function tot(p){return(p.a||0)+(p.b||0)+(p.c||0)+(p.d||0);}
function pct(p,k){const t=tot(p);return t?Math.round((p[k]||0)/t*100):0;}

function pollCard({key,title,title_en,opts,followup,followup_en}){
  const p=getPoll(key);const t=tot(p);const zh=ST.lang==="zh";
  return `<div class="qBox">
    <p class="qTitle">📊 ${zh?title:title_en}</p>
    <div class="options">
      ${opts.map(([k,lz,le])=>`<button class="opt${p.choice===k?' chosen':''}" data-poll="${key}" data-opt="${k}">${k.toUpperCase()}. ${zh?lz:le}</button>`).join("")}
    </div>
    ${t>0?`<div style="margin-top:10px;display:grid;gap:4px;">
      ${opts.map(([k,lz,le])=>`<div style="display:flex;align-items:center;gap:6px;">
        <span style="width:30px;font-weight:900;font-family:var(--mono);font-size:12px;">${pct(p,k)}%</span>
        <div class="bar"><div class="fill" style="width:${pct(p,k)}%"></div></div>
        <span style="font-size:12px;color:var(--muted)">${k.toUpperCase()}. ${zh?lz:le}</span>
      </div>`).join("")}
      <div class="barWrap"><span class="smallVote">${t} 票</span></div>
    </div>`:""} 
    ${(zh?followup:followup_en)?`<hr class="sep"/><p class="sm" style="font-weight:800;">💬 討論追問</p><ul class="ul" style="font-size:13px;margin-top:0;color:var(--muted);">${(zh?followup:followup_en).map(q=>`<li>${q}</li>`).join("")}</ul>`:""}
  </div>`;
}

function quizCard({key,q,q_en,opts,ans,exp,exp_en}){
  const zh=ST.lang==="zh";const done=ST.quizDone[key];
  return `<div class="qBox">
    <p class="qTitle">🧠 ${zh?q:q_en}</p>
    <div class="options">
      ${opts.map(([lz,le],i)=>`<button class="opt${done===i+1?(i===ans?' correct':' wrong'):''}" data-quiz="${key}" data-idx="${i}" ${done?'disabled':''}>${String.fromCharCode(65+i)}. ${zh?lz:le}</button>`).join("")}
    </div>
    ${done?`<div class="callout ${done-1===ans?'green':'red'}" style="margin-top:10px;">
      <p class="p" style="font-size:13px;">${done-1===ans?"✅":"❌"} ${zh?exp:exp_en}</p>
    </div>`:""}
  </div>`;
}

function timeTags(cur){
  const segs=[["s0","🎬 S0","8min"],["t1","🏛️ T1 Reuer","20min"],["t2","⚡ T2 Zahoor","15min"],["c1","🚜 C1 案例","12min"],["s1","📝 S1 Memo","5min"]];
  return `<div class="timeTracker">${segs.map(([k,l,t])=>`<span class="timePill ${k} ${k===cur?'cur':''}" style="${k===cur?'':'opacity:.5'}">${l} ${t}</span>`).join("")}</div>`;
}

function revealBtn(id,label="💡 教師提示"){
  return `<button class="btn gold" style="font-size:12px;padding:6px 12px;" onclick="toggleReveal('${id}')">${label}</button>`;
}
function revealSection(id,html){
  const shown=ST.reveals[id];
  return `<div id="${id}Rev" class="revealBox callout teacher${shown?' visible':''}" style="margin-top:10px;">
    <p style="font-size:11px;font-weight:900;color:#92400E;margin:0 0 6px;">📋 TEACHER NOTE ${IS_TEACHER?'':'(隱藏)'}</p>
    ${html}
  </div>`;
}
function toggleReveal(id){
  const el=document.getElementById(id+"Rev");
  ST.reveals[id]=!ST.reveals[id];
  el.classList.toggle("visible",ST.reveals[id]);
  save();
}

// ═══ AI exercise helpers ═══
// Copy prompt text to clipboard with visual feedback on the button
function copyPromptText(elementId, btn){
  const el=document.getElementById(elementId);
  if(!el) return;
  const text=el.textContent;
  const finishOk=()=>{
    if(!btn) return;
    const orig=btn.innerHTML;
    btn.innerHTML="✓ "+(ST.lang==="zh"?"已複製！":"Copied!");
    btn.classList.add("copied");
    setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove("copied");},2000);
  };
  const fallback=()=>{
    // Fallback for older browsers / non-https contexts
    const ta=document.createElement("textarea");
    ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");finishOk();}
    catch(e){alert((ST.lang==="zh"?"複製失敗，請手動選取文字。":"Copy failed, please select text manually.")+"\n"+e.message);}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(finishOk).catch(fallback);
  }else{
    fallback();
  }
}

    </ul>

}

        <thead><tr><th>層次</th><th>問題</th><th>關鍵概念</th></tr></thead>
        <tbody>
          <tr><td><strong>問題定義</strong></td><td>佃面臨的具體 IP 保護 vs. 速度困境是？</td><td>Asset specificity, misappropriation risk</td></tr>
          <tr><td><strong>框架分析</strong></td><td>Reuer 三機制各自如何應用？</td><td>Incentives / Admin Controls / Supporting legal institutions</td></tr>
          <tr><td><strong>選項比較</strong></td><td>Gear Ghost vs. Teikoku，各需要什麼結構？</td><td>Bespoke governance, JSC, CIA</td></tr>
          <tr><td><strong>建議與理由</strong></td><td>你的建議是？AMC 的哪個維度最關鍵？</td><td>AMC → CIA → Post-entry speed</td></tr>
        </tbody>
      </table>
    </div>
    <textarea id="memoText" class="critiqueInput" rows="8" placeholder="${zh?'TO: 佃製作所經營團隊\nFROM: 策略顧問\nSUBJECT: 農業機械 R&D 聯盟治理建議\n\n問題：...\n分析：...\n選項：...\n建議：...':'TO: Tsukuda Factory Management Team\nFROM: Strategy Consultant\nSUBJECT: Agricultural Machinery R&D Alliance Governance Recommendation\n\nProblem: ...\nAnalysis: ...\nOptions: ...\nRecommendation: ...'}" oninput="updateWC('memoText','memoWC')"></textarea>
    <div id="memoWC" class="wc">0 字 / Words</div>
  </div>

  ${IS_TEACHER?revealBtn("s1note","📋 教師引導：Memo 評分指引（先讀 Memo 再展開）"):""}
  ${IS_TEACHER?revealSection("s1note",`
    <p style="font-weight:900;font-size:13px;color:#92400E;margin:0 0 8px;">📋 TEACHER NOTE — Memo 評分指引</p>
    <p style="font-size:12px;color:#92400E;margin:0 0 8px;font-style:italic;">建議使用流程：先讓學生寫完 Memo（5–7 分鐘），抽 2–3 份匿名朗讀後再展開此評分標準對照。</p>
    <div class="tbl" style="margin-top:8px;">
      <table class="tbl" style="font-size:12px;">
        <thead><tr><th>評分標準</th><th>優秀（A）</th><th>普通（B/C）</th><th>需改進</th></tr></thead>
        <tbody>
          <tr><td><strong>理論整合</strong></td><td>明確引用並整合 Reuer 三機制 + Zahoor AMC→CIA 中介路徑</td><td>提到兩篇文章，但連結不清楚</td><td>只有直覺建議，無理論支持</td></tr>
          <tr><td><strong>具體性</strong></td><td>提出具體機制設計（如：JSC 決策規則、IP 爭端仲裁條款）</td><td>有方向但不具體</td><td>抽象建議（「建立信任」等）</td></tr>
          <tr><td><strong>問題意識</strong></td><td>識別競合脈絡（Teikoku 情況）的特殊性</td><td>一般性討論</td><td>沒有區分兩個夥伴的差異</td></tr>
          <tr><td><strong>因果邏輯</strong></td><td>AMC 需透過 CIA 才能影響速度（中介邏輯清楚）</td><td>提到 AMC，但忘記 CIA 的角色</td><td>說 AMC 直接等於速度（誤用）</td></tr>
        </tbody>
      </table>
    </div>
    <p style="font-size:13px;margin-top:8px;"><strong>優秀答案的核心論點</strong>：建議與 Gear Ghost 簽訂雙邊非股權協議（bilateral non-equity），在合約中嵌入 JSC（行政控制），IP 爭端保留訴訟選項（法律機制）。同時集中培養 AMC 的「組織間協調」和「學習」維度，以驅動激進 × 漸進共同創新，最終加速後進入市場的速度。</p>
    <p style="font-size:12px;margin-top:8px;color:#92400E;"><strong>與 OpenAI×Microsoft 連結</strong>：可在收尾時提醒——Microsoft 用了 6 年（2019→2025）才從錯誤的治理結構中重新談判出來，付出了 ~2023 年董事會危機的代價；佃製作所沒有那種重新談判的本錢，必須在 ex ante 就設計對。</p>
  `):""}`;
}

// ═══ RENDER ENGINE ═══
function render(){
  const v=ST.view;
  let html="";
  if(v==="s0") html=viewS0();
  else if(v==="t1") html=viewT1();
  else if(v==="t2") html=viewT2();
  else if(v==="c1") html=viewC1();
  else if(v==="s1") html=viewS1();
  content.innerHTML=html;
  bindEvents();
  restoreRevealStates();
  // restore saved textareas
  ["memoText","ai2Critique","ai3Critique","debateInput","ai2Response","ai3Response","gameAIResponse","gameReflect"].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&ST[id])el.value=ST[id];
  });
  window.scrollTo({top:0,behavior:"smooth"});
}

function bindEvents(){
  // nav
  document.querySelectorAll(".navItem").forEach(b=>{
    b.classList.toggle("active",b.dataset.view===ST.view);
    b.onclick=()=>{ST.view=b.dataset.view;save();render();};
  });
  // polls
  document.querySelectorAll(".opt[data-poll]").forEach(b=>{
    b.onclick=()=>{vote(b.dataset.poll,b.dataset.opt);render();};
  });
  // quizzes
  document.querySelectorAll(".opt[data-quiz]").forEach(b=>{
    b.onclick=()=>{
      const k=b.dataset.quiz;const i=parseInt(b.dataset.idx);
      if(!ST.quizDone[k]){ST.quizDone[k]=i+1;save();render();}
    };
  });
  // ═══ Alliance Governance Choice Game ═══
  document.querySelectorAll(".opt[data-game]").forEach(b=>{
    const k=b.dataset.game;
    if(ST.game&&ST.game[k]===b.dataset.val) b.classList.add("chosen");
    b.onclick=()=>{
      if(!ST.game)ST.game={};
      ST.game[k]=b.dataset.val;
      save();
      // Refresh visual state on this decision row
      document.querySelectorAll(`.opt[data-game="${k}"]`).forEach(o=>{
        o.classList.toggle("chosen",o.dataset.val===b.dataset.val);
      });
      updateGameUI();
    };
  });
  updateGameUI();
  document.getElementById("revealRealityBtn")?.addEventListener("click",()=>{
    ST.gameRevealed=true;save();
    const block=document.getElementById("realityRevealBlock");
    if(block){block.style.display="block";updateGameScore();}
  });
  // restore reveal state
  if(ST.gameRevealed){
    const block=document.getElementById("realityRevealBlock");
    if(block){block.style.display="block";updateGameScore();}
  }
  // game textareas
  ["gameAIResponse","gameReflect"].forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      if(ST[id])el.value=ST[id];
      el.addEventListener("input",()=>{ST[id]=el.value;save();updateWC(id,id+"WC");});
      updateWC(id,id+"WC");
    }
  });
  // topbar
  document.getElementById("btnLang")?.addEventListener("click",()=>{ST.lang=ST.lang==="zh"?"en":"zh";save();render();});
  document.getElementById("btnReset")?.addEventListener("click",()=>{if(confirm("Reset all progress?")){{localStorage.removeItem(STORE);ST={...DEF};render();}}});
  // wc on textareas
  ["memoText","ai2Critique","ai3Critique","debateInput","ai2Response","ai3Response"].forEach(id=>{
    const el=document.getElementById(id);
    const wcId=id==="memoText"?"memoWC":id.replace("Critique","WC").replace("Input","WC");
    if(el){
      updateWC(id,wcId);
      el.addEventListener("input",()=>{ST[id]=el.value;save();updateWC(id,wcId);});
    }
  });
}

// Update UI for game (status, AI block visibility, prompt)
function updateGameUI(){
  const g=ST.game||{};
  const status=document.getElementById("gameChoiceStatus");
  if(!status)return;
  const zh=ST.lang==="zh";
  const made=["d1","d2","d3"].filter(k=>g[k]).length;
  status.textContent=zh?
    `已完成 ${made}/3 項決策 ${made===3?"✓ 可以進入 AI 設計階段":"（請完成所有 3 項決策）"}`:
    `${made}/3 decisions made ${made===3?"✓ Ready for AI co-design":"(complete all 3 to proceed)"}`;

  const aiBlock=document.getElementById("gameAIBlock");
  if(aiBlock){
    aiBlock.style.display=made===3?"block":"none";
    if(made===3) buildGamePrompt();
  }
}

// Build dynamic prompt based on student's choices
function buildGamePrompt(){
  const g=ST.game||{};
  const zh=ST.lang==="zh";
  const labels={
    d1:{a:zh?"直接收購（Microsoft 全資買下 OpenAI）":"Direct acquisition",b:zh?"資本上限合夥（capped-profit LP）+ 獨家授權":"Capped-profit LP + exclusive license",c:zh?"量身訂製：非股權聯盟 + 明確 IP 邊界 + 階段式股權":"Bespoke: non-equity alliance + explicit IP boundaries + milestone-based equity"},
    d2:{a:zh?"無正式席位、無 JSC":"No formal seat, no JSC",b:zh?"一席無投票權觀察員 + 雙公司 JSC（每月）":"One non-voting observer + bilateral JSC (monthly)",c:zh?"多數投票席位":"Voting majority"},
    d3:{a:zh?"AGI 由 OpenAI 董事會單方判定 + 純訴訟":"AGI judged unilaterally by OpenAI board + litigation only",b:zh?"AGI = 外部仲裁人 + 營收測試 + 分層爭端解決":"AGI = external arbiter + revenue test + tiered dispute resolution",c:zh?"完全不設 AGI 條款":"Drop AGI clause entirely"}
  };
  const text=zh?
`你是一位精通 Reuer (2024) 與 Keller et al. (2021) 框架的聯盟治理顧問。

【情境】
時間：2019 年 7 月
雙方：OpenAI（非營利 AI 研究實驗室）+ Microsoft（雲端與生產力軟體巨頭）
Microsoft 投入 $1B（後續預計累計到 $13B）。OpenAI 急需 GPU 算力以訓練前沿模型。雙方都不希望被對方壟斷或併吞。

【用戶（顧問）的設計選擇】
• Reuer 激勵機制（D1）：${labels.d1[g.d1]||"未選"}
• Reuer 行政控制（D2）：${labels.d2[g.d2]||"未選"}
• Reuer 法律機制（D3）：${labels.d3[g.d3]||"未選"}

【任務】
1. 用 Reuer 的三大機制（incentives / admin controls / legal institutions）診斷上述設計組合的優點與盲點。
2. 套用 Keller et al. (2021) 的 2×2 類型學，標出此設計屬於哪個格子，並指出最大的『中斷』脆弱性（disruption vulnerability）。
3. 給出 3-5 條具體的合約條款建議，補強上述設計（例如：JSC 開會頻率、IP 邊界子句、爭端分流規則、股權轉換觸發條件）。
4. 預測：若 5 年後 OpenAI 的 CEO 突然被解雇（假想中斷情境），上述設計能否承受？

【輸出要求】
- 繁體中文
- 約 350-450 字
- 條理分明，先診斷後建議`:
`You are an alliance-governance consultant fluent in Reuer (2024) and Keller et al. (2021).

[CONTEXT]
Time: July 2019
Parties: OpenAI (nonprofit AI research lab) + Microsoft (cloud & productivity software giant)
Microsoft is investing $1B (expected to grow to $13B). OpenAI desperately needs GPU compute to train frontier models. Neither party wants to be absorbed or monopolized.

[USER'S DESIGN CHOICES]
• Reuer Incentives (D1): ${labels.d1[g.d1]||"not chosen"}
• Reuer Admin Controls (D2): ${labels.d2[g.d2]||"not chosen"}
• Reuer Legal Institutions (D3): ${labels.d3[g.d3]||"not chosen"}

[TASK]
1. Use Reuer's three mechanisms (incentives / admin controls / legal institutions) to diagnose strengths and blind spots of this design.
2. Apply Keller et al. (2021)'s 2×2 typology — identify which cell this design occupies and flag the biggest 'disruption vulnerability'.
3. Propose 3-5 concrete contract terms to strengthen the design (e.g., JSC meeting cadence, IP boundary clauses, dispute-routing rules, equity-conversion triggers).
4. Predict: if 5 years later OpenAI's CEO is abruptly fired (hypothetical disruption), would this design survive?

[OUTPUT]
- English
- ~350-450 words
- Diagnose first, then recommend`;
  const el=document.getElementById("gamePrompt");
  if(el)el.textContent=text;
}

function updateGameScore(){
  const g=ST.game||{};
  // Reuer-aligned answers: D1=C, D2=B, D3=B
  let score=0;
  if(g.d1==="c")score++;
  if(g.d2==="b")score++;
  if(g.d3==="b")score++;
  const total=3;
  const zh=ST.lang==="zh";
  const verdicts=[
    zh?"⚠️ 你完全走了 OpenAI 2019 的舊路。事後得花 $13B 才修補。":"⚠️ You took OpenAI's exact 2019 path. It cost $13B to patch.",
    zh?"⚠️ 你做了一些 Reuer-aligned 選擇，但仍會在 2023 危機中暴露。":"⚠️ Some Reuer-aligned choices, but still exposed in the 2023 crisis.",
    zh?"👍 你的設計接近 2026 年才被學到的版本。":"👍 Your design approaches what was only learned by 2026.",
    zh?"🏆 滿分！你預先設計了 OpenAI/Microsoft 用 7 年才掙來的治理結構。":"🏆 Perfect score! You pre-designed what OpenAI/Microsoft took 7 years to learn."
  ];
  const el=document.getElementById("gameScoreText");
  if(el)el.textContent=`${score}/${total} — ${verdicts[score]}`;
}

function updateWC(inputId,wcId){
  const el=document.getElementById(inputId);
  const wc=document.getElementById(wcId);
  if(!el||!wc)return;
  const n=countWords(el.value);
  const targets={memoText:200,ai2Critique:100,ai3Critique:150,debateInput:120,ai2Response:100,ai3Response:100,gameAIResponse:300,gameReflect:120};
  const t=targets[inputId]||150;
  wc.textContent=`${n} 字 / ${t} 目標`;
  wc.style.color=n>=t?"#15803d":n>t*0.5?"#B45309":"var(--muted)";
}

function restoreRevealStates(){
  if(!ST.reveals)return;
  Object.keys(ST.reveals).forEach(id=>{
    const el=document.getElementById(id+"Rev");
    if(el&&ST.reveals[id])el.classList.add("visible");
  });
}

// (AI Exercise functions removed — replaced with copy-prompt UI in viewT1/T2/C1)

// keyboard navigation
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT") return;
  const i=VIEW_ORDER.indexOf(ST.view);
  if(e.key==="ArrowRight"||e.key==="]") {if(i<VIEW_ORDER.length-1){ST.view=VIEW_ORDER[i+1];save();render();}}
  if(e.key==="ArrowLeft"||e.key==="[") {if(i>0){ST.view=VIEW_ORDER[i-1];save();render();}}
  if(e.key==="l"||e.key==="L"){ST.lang=ST.lang==="zh"?"en":"zh";save();render();}
  if(e.key==="r"||e.key==="R"){if(confirm("Reset?")){{localStorage.removeItem(STORE);ST={...DEF};render();}}}
});

render();
</script>
